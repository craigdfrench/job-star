//! Capabilities: the read/write/execute-style permissions a worker may exercise.

use serde::{Deserialize, Serialize};
use std::collections::BTreeSet;

/// A discrete capability that can be granted to a worker operating within a
/// domain. These are the atoms the supervisor checks before allowing an action.
#[derive(
    Debug, Clone, Copy, PartialEq, Eq, Hash, PartialOrd, Ord, Serialize, Deserialize,
)]
#[serde(rename_all = "snake_case")]
pub enum Capability {
    /// Inspect state (read files, query services, observe).
    Read,
    /// Mutate state (write files, change config, send commands that alter).
    Write,
    /// Run arbitrary executables / shells / subprocesses.
    Execute,
    /// Create sub-goals or spawn child workers.
    Spawn,
    /// Communicate with the supervisor (report progress, request escalation).
    Signal,
}

/// An ordered set of capabilities. `BTreeSet` gives deterministic serialization
/// and stable equality, which matters for constraint checks and audit logs.
pub type CapabilitySet = BTreeSet<Capability>;

impl Capability {
    /// Every capability. Used for trusted/bootstrap domains.
    pub fn all() -> CapabilitySet {
        [
            Capability::Read,
            Capability::Write,
            Capability::Execute,
            Capability::Spawn,
            Capability::Signal,
        ]
        .into_iter()
        .collect()
    }

    /// A safe default: observe and talk to the supervisor, but change nothing.
    pub fn read_only() -> CapabilitySet {
        [Capability::Read, Capability::Signal].into_iter().collect()
    }

    /// Read + write, but no arbitrary execution and no spawning.
    pub fn read_write() -> CapabilitySet {
        [Capability::Read, Capability::Write, Capability::Signal]
            .into_iter()
            .collect()
    }
}


