[package]
name = "jobstar-supervisor"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
tracing = "0.1"
dashmap = "5.5"
parking_lot = "0.12"

[dev-dependencies]
pretty_assertions = "1.4"
