[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jobstar"
version = "0.1.0"
description = "Job-Star: context gatherer, triage, router, and supervisor"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["jobstar*"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests", "jobstar"]
python_files = ["test_*.py", "*_test.py"]
asyncio_mode = "auto"
addopts = "-ra -q"

[tool.mypy]
python_version = "3.10"
namespace_packages = true
