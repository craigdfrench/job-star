"""Verify all Job-Star Python imports resolve and pytest can collect.

Run: python scripts/verify_imports.py
Exit code 0 = all good.
"""
from __future__ import annotations

import importlib
import sys
from pathlib import Path


COMPONENTS = [
    "jobstar",
    "jobstar.context_gatherer",
    "jobstar.context_gatherer.models",
    "jobstar.context_gatherer.sources",
    "jobstar.context_gatherer.gatherer",
    "jobstar.triage",
    "jobstar.triage.models",
    "jobstar.triage.rules",
    "jobstar.triage.engine",
    "jobstar.router",
    "jobstar.router.models",
    "jobstar.router.targets",
    "jobstar.router.router",
    "jobstar.supervisor",
    "jobstar.supervisor.models",
    "jobstar.supervisor.orchestrator",
]


def check_imports() -> list[tuple[str, str]]:
    failures: list[tuple[str, str]] = []
    for mod in COMPONENTS:
        try:
            importlib.import_module(mod)
            print(f"OK   {mod}")
        except Exception as exc:  # noqa: BLE001
            failures.append((mod, f"{type(exc).__name__}: {exc}"))
            print(f"FAIL {mod}: {type(exc).__name__}: {exc}")
    return failures


def check_pytest_collect() -> int:
    try:
        import pytest
    except ImportError:
        print("SKIP pytest not installed")
        return 0
    root = Path(__file__).resolve().parent.parent
    code = pytest.main(
        ["--collect-only", "-q", "--rootdir", str(root), str(root)],
        ["--collect-only"],
    )
    # 0 = no tests collected but ran fine; 5 = no tests collected
    if code in (0, 5):
        print(f"OK   pytest collect (exit={code})")
        return 0
    print(f"FAIL pytest collect (exit={code})")
    return code


def main() -> int:
    root = Path(__file__).resolve().parent.parent
    sys.path.insert(0, str(root))
    failures = check_imports()
    pycode = check_pytest_collect()
    if failures or pycode not in (0,):
        print("\nVERIFICATION FAILED")
        return 1
    print("\nVERIFICATION PASSED")
    return 0


if __name__ == "__main__":
    raise SystemExit(main())


