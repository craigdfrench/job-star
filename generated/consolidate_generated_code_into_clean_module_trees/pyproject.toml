[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jobstar"
version = "0.1.0"
description = "Job-Star: a supervised, triaging, routing job execution framework"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Job-Star" }]
keywords = ["job", "scheduler", "triage", "router", "supervisor"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
]

dependencies = [
    "pydantic>=2.5,<3",
    "httpx>=0.27,<1",
    "pyyaml>=6.0,<7",
    "click>=8.1,<9",
    "rich>=13.7,<14",
    "structlog>=24.1,<25",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "mypy>=1.10",
    "maturin>=1.5",
]
native = [
    # Built from the Rust workspace via maturin:
    #   maturin develop --release -m supervisor/Cargo.toml
    "jobstar-supervisor>=0.1.0",
]

[project.scripts]
jobstar = "jobstar.cli:main"

[tool.setuptools.packages.find]
include = ["jobstar*"]
exclude = ["tests*", "supervisor*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers"


