[project]
name = "job-star"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]


// --- DUPLICATE BLOCK ---

# Install in dev mode
pip install -e ".[dev]"

# Run all triage tests
pytest tests/triage/ -v

# Run with coverage
pytest tests/triage/ --cov=job_star.triage --cov-report=term-missing


