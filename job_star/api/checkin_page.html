<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job-Star Check-In</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
  --text: #e0e0e8; --dim: #6b6f7e; --accent: #5b8def;
  --green: #4caf50; --red: #ef5350; --yellow: #ffca28; --orange: #ff9800;
  --user-bg: #1a2a3a; --ai-bg: #1a1d27;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; padding: 16px; max-width: 800px; margin: 0 auto;
}
h1 { font-size:18px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
h2 { font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:16px 0 8px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:12px; }
.summary { line-height:1.6; white-space:pre-wrap; }
.q-item { padding:10px 0; border-bottom:1px solid var(--border); }
.q-item:last-child { border-bottom:none; }
.q-label { font-weight:600; margin-bottom:4px; }
.q-options { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
.q-opt { padding:6px 14px; border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:13px; transition: all 0.15s; }
.q-opt:hover { border-color:var(--accent); background:#1a2233; }
.q-opt.selected { background:var(--accent); border-color:var(--accent); color:#fff; }
.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
.b-progress{background:#1a3a1a;color:var(--green)} .b-completion{background:#1a3a1a;color:var(--green)}
.b-clarification{background:#3a2a1a;color:var(--yellow)} .b-milestone{background:#1a2a3a;color:var(--accent)}
.b-sent{background:#2a2a1a;color:var(--yellow)} .b-responded{background:#1a3a1a;color:var(--green)}
.b-actioned{background:#1a1a2a;color:var(--dim)}
/* Chat */
#chat { max-height:300px; overflow-y:auto; margin-bottom:8px; }
.msg { padding:10px 14px; border-radius:8px; margin-bottom:8px; max-width:90%; }
.msg-user { background:var(--user-bg); margin-left:auto; text-align:right; }
.msg-ai { background:var(--card); border:1px solid var(--border); }
.msg-system { color:var(--dim); font-size:12px; text-align:center; padding:4px; }
.input-row { display:flex; gap:8px; margin-top:8px; }
#chat-input { flex:1; padding:10px; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:inherit; font-size:13px; }
#chat-input:focus { outline:none; border-color:var(--accent); }
button { padding:8px 16px; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text); cursor:pointer; font-family:inherit; font-size:13px; transition: all 0.15s; }
button:hover { border-color:var(--accent); }
button:disabled { opacity:0.5; cursor:default; }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-primary:hover { background:#4a7ddf; }
.btn-accept { background:var(--green); border-color:var(--green); color:#fff; }
.btn-accept:hover { background:#3d9b40; }
.btn-reject { background:var(--red); border-color:var(--red); color:#fff; }
.btn-reject:hover { background:#d44545; }
.btn-draft { background:transparent; border-color:var(--accent); color:var(--accent); }
.btn-draft:hover { background:#1a2233; }
.btn-small { padding:4px 10px; font-size:12px; }
.actions { margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
#feedback-box { width:100%; padding:10px; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:inherit; font-size:13px; margin-top:8px; min-height:60px; resize:vertical; }
#feedback-box:focus { outline:none; border-color:var(--accent); }
.result { padding:12px; border-radius:8px; margin-top:12px; display:none; }
.result-success { background:#1a3a1a; border:1px solid var(--green); }
.result-error { background:#3a1a1a; border:1px solid var(--red); }
.link { color:var(--accent); text-decoration:none; }
.link:hover { text-decoration:underline; }
.dim { color:var(--dim); }
.nav { display:flex; gap:16px; padding:8px 0; margin-bottom:16px; border-bottom:1px solid var(--border); }
.nav a { color:var(--dim); text-decoration:none; font-size:13px; }
.nav a:hover { color:var(--accent); }
.nav a.active { color:var(--accent); font-weight:500; }
.hint { font-size:12px; color:var(--dim); margin-top:4px; }
.selected-display { font-size:12px; color:var(--accent); margin-top:6px; }
</style>
</head>
<body>
<div class="nav">
  <a href="/add">+ Add Goal</a>
  <a href="/checkins">Check-ins</a>
</div>
<h1><span class="dot" id="status-dot"></span> <span id="title">Loading…</span></h1>
<div id="content">
  <div class="card"><p class="dim">Fetching check-in details…</p></div>
</div>

<script>
const API = window.location.origin + '/api/v1';
const checkInId = window.location.pathname.split('/').pop();
let checkInData = null;  // cached check-in for submit flow

async function loadCheckIn() {
  try {
    const r = await fetch(`${API}/check-ins/${checkInId}`);
    if (!r.ok) throw new Error(r.status);
    const ci = await r.json();
    checkInData = ci;
    renderCheckIn(ci);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="card"><p style="color:var(--red)">Could not load check-in. It may not exist or the API is down.</p></div>';
  }
}

function renderCheckIn(ci) {
  document.getElementById('title').textContent = ci.type.charAt(0).toUpperCase() + ci.type.slice(1) + ' Check-In';
  document.title = `Job-Star: ${ci.type}`;

  const typeBadges = {
    progress: ['b-progress', '📊 Progress'],
    clarification: ['b-clarification', '❓ Clarification'],
    milestone: ['b-milestone', '🏁 Milestone'],
    completion: ['b-completion', '✅ Completion']
  };
  const [badgeClass, badgeText] = typeBadges[ci.type] || ['b-progress', ci.type];
  const statusBadge = ci.is_pending
    ? '<span class="badge b-sent">awaiting your response</span>'
    : `<span class="badge b-${ci.status}">${ci.status}</span>`;

  let html = `<div class="card"><span class="badge ${badgeClass}">${badgeText}</span> ${statusBadge}</div>`;

  if (ci.progress_summary) {
    html += `<h2>Progress Summary</h2><div class="card summary">${esc(ci.progress_summary)}</div>`;
  }
  if (ci.results) {
    html += `<h2>Results</h2><div class="card summary">${esc(ci.results)}</div>`;
  }
  if (ci.next_steps) {
    html += `<h2>Next Steps</h2><div class="card summary">${esc(ci.next_steps)}</div>`;
  }

  // Questions
  if (ci.questions && ci.questions.length > 0) {
    html += '<h2>Questions</h2><div class="card">';
    ci.questions.forEach((q, i) => {
      html += `<div class="q-item"><div class="q-label">${i+1}. ${esc(q.question)}</div>`;
      if (q.options && q.options.length > 0) {
        html += '<div class="q-options">';
        q.options.forEach((opt, j) => {
          const sel = q.answer === opt ? ' selected' : '';
          html += `<div class="q-opt${sel}" data-qid="${q.id}" data-val="${esc(opt)}" onclick="selectOpt(this)">${esc(opt)}</div>`;
        });
        html += '</div>';
      }
      if (q.answer) {
        html += `<p class="dim" style="margin-top:4px">→ Your answer: ${esc(q.answer)}</p>`;
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Chat interface (only if pending)
  if (ci.is_pending) {
    html += `
      <h2>Discuss with Job-Star AI</h2>
      <div class="card">
        <div id="chat"></div>
        <div class="input-row">
          <input id="chat-input" type="text" placeholder="Ask about this check-in, or ask the AI to help you decide..." onkeydown="if(event.key==='Enter')sendChat()">
          <button onclick="sendChat()" id="chat-btn">Send</button>
        </div>
        <div class="actions" style="margin-top:10px;">
          <button class="btn-draft btn-small" onclick="draftResponseWithAI()" id="draft-btn">✍️ Draft my response with AI</button>
        </div>
        <p class="hint">The AI can help you think through the check-in and draft a structured response. Edit the draft before submitting.</p>
      </div>
    `;

    // Response section
    html += `<h2>Your Response</h2><div class="card">`;
    html += `<p class="dim" style="margin-bottom:8px;">Add optional feedback or context for job-star:</p>`;
    html += `<textarea id="feedback-box" placeholder="Type your feedback here, or click 'Draft my response with AI' above to have the AI help you..."></textarea>`;

    // Submit buttons
    html += `<div class="actions">`;

    if (ci.type === 'completion') {
      html += `<button class="btn-accept" onclick="submitResponse('Accept')">✓ Accept</button>`;
      html += `<button class="btn-reject" onclick="submitResponse('Needs revision')">✗ Needs Revision</button>`;
    } else if (ci.questions && ci.questions.some(q => q.options && q.options.length > 0)) {
      // Choice questions — submit sends the selected options
      html += `<button class="btn-primary" onclick="submitResponse('')">📤 Submit Selection</button>`;
      html += `<p class="hint" id="selection-hint">Select an option above, then click Submit Selection.</p>`;
    } else {
      // Text/open-ended questions
      html += `<button class="btn-primary" onclick="submitResponse('')">📤 Submit Response</button>`;
    }

    html += `</div></div>`;
  } else if (ci.response) {
    html += `<h2>Your Response</h2><div class="card summary">${esc(ci.response)}</div>`;
  }

  html += `<div class="result" id="result"></div>`;
  document.getElementById('content').innerHTML = html;

  // Initialize chat
  if (ci.is_pending) {
    addSystemMessage('Ask me anything about this check-in. I can explain the progress, the questions, or help you decide what to do.');
  }
}

function selectOpt(el) {
  el.parentElement.querySelectorAll('.q-opt').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');

  // Update the selection hint
  const hint = document.getElementById('selection-hint');
  if (hint) {
    hint.textContent = `Will submit: "${el.dataset.val}"`;
    hint.style.color = 'var(--accent)';
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('chat-btn');
  const text = input.value.trim();
  if (!text) return;

  addUserMessage(text);
  input.value = '';
  btn.disabled = true;
  input.placeholder = 'Thinking...';

  try {
    const r = await fetch(`${API}/check-ins/${checkInId}/discuss`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    addAIMessage(data.response);
  } catch(e) {
    addSystemMessage('Could not reach the discussion endpoint. Make sure the API is running.');
  }

  btn.disabled = false;
  input.placeholder = 'Ask about this check-in...';
  input.focus();
}

async function draftResponseWithAI() {
  const draftBtn = document.getElementById('draft-btn');
  const feedbackBox = document.getElementById('feedback-box');
  draftBtn.disabled = true;
  draftBtn.textContent = '✍️ Drafting...';

  // Ask the AI to draft a structured response based on the check-in context
  const draftPrompt = 'Help me draft a clear, structured response to this check-in. Consider the progress summary, results, and questions. Write a concise response I can send as my feedback. If there are questions with options, recommend which option to choose and why. Format it as 2-3 sentences.';

  try {
    const r = await fetch(`${API}/check-ins/${checkInId}/discuss`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: draftPrompt})
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();

    // Put the AI's draft into the feedback box for the user to edit
    if (feedbackBox) {
      feedbackBox.value = data.response;
      feedbackBox.focus();
      feedbackBox.scrollIntoView({behavior: 'smooth', block: 'center'});
    }
    addAIMessage('I drafted a response for you in the feedback box below. Edit it as you see fit, then submit.');
  } catch(e) {
    addSystemMessage('Could not draft a response. Try typing your response manually.');
  }

  draftBtn.disabled = false;
  draftBtn.textContent = '✍️ Draft my response with AI';
}

async function submitResponse(answer) {
  const feedback = document.getElementById('feedback-box')?.value.trim() || '';
  const decisions = [];

  // Collect selected options from choice questions
  document.querySelectorAll('.q-opt.selected').forEach(el => {
    decisions.push({question_id: el.dataset.qid, answer: el.dataset.val});
  });

  // If an explicit answer was given (accept/reject for completion), find the approval question
  if (answer) {
    if (checkInData && checkInData.questions) {
      for (const q of checkInData.questions) {
        if (q.type === 'approval' && !decisions.find(d => d.question_id === q.id)) {
          decisions.push({question_id: q.id, answer: answer});
        }
      }
    }
  }

  // Validate: if there are choice questions but no selection, warn
  const hasChoiceQs = checkInData && checkInData.questions && checkInData.questions.some(q => q.options && q.options.length > 0);
  if (hasChoiceQs && decisions.length === 0 && !answer) {
    const hint = document.getElementById('selection-hint');
    if (hint) {
      hint.textContent = '⚠️ Please select an option first.';
      hint.style.color = 'var(--red)';
    }
    return;
  }

  const body = {response: feedback || answer || 'Submitted via web interface', decisions: decisions};
  const result = document.getElementById('result');

  try {
    const r = await fetch(`${API}/check-ins/${checkInId}/respond`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();

    result.style.display = 'block';
    result.className = 'result result-success';
    result.innerHTML = `<strong>✓ Response submitted.</strong> ${data.actions && data.actions.length ? 'Actions: ' + data.actions.join(', ') : ''}`;

    // Reload to show updated state
    setTimeout(() => loadCheckIn(), 2000);
  } catch(e) {
    result.style.display = 'block';
    result.className = 'result result-error';
    result.innerHTML = '<strong>✗ Could not submit response.</strong> The API may be down.';
  }
}

function addUserMessage(text) {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg msg-user">${esc(text)}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
function addAIMessage(text) {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg msg-ai">${esc(text)}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
function addSystemMessage(text) {
  const chat = document.getElementById('chat');
  chat.innerHTML += `<div class="msg-system">${esc(text)}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

loadCheckIn();
</script>
</body>
</html>
