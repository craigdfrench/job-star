<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job-Star — Goal</title>
  <style>
    :root {
      --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
      --text: #e6e6e6; --muted: #9aa3b2; --accent: #4ea1ff;
      --green: #3bd972; --red: #ff6b6b; --yellow: #ffca28; --orange: #ff9800;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
    }
    .container { max-width: 700px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 1.3rem; margin: 0 0 4px; }
    .subtitle { color: var(--muted); margin-bottom: 16px; font-size: 0.9rem; }
    .nav { display:flex; gap:16px; padding:8px 0; margin-bottom:16px; border-bottom:1px solid var(--border); }
    .nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; }
    .nav a:hover { color:var(--accent); }
    .nav a.active { color:var(--accent); font-weight:500; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:12px; }
    .meta-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; font-size:0.85rem; color:var(--muted); margin-bottom:12px; }
    .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:0.75rem; font-weight:600; }
    .b-coding { background:#1a2a3a; color:var(--accent); }
    .b-infra { background:#1a3a3a; color:#5ad; }
    .b-personal { background:#3a2a1a; color:var(--orange); }
    .b-meta { background:#2a1a2a; color:#c5a; }
    .b-soon { background:#3a2a1a; color:var(--yellow); }
    .b-imperative { background:#3a1a1a; color:var(--red); }
    .b-idle { background:#1a1a2a; color:var(--muted); }
    .b-completed { background:#1a3a1a; color:var(--green); }
    .b-abandoned { background:#3a1a1a; color:var(--red); }
    .progress-bar { height: 8px; background: var(--border); border-radius: 4px; margin: 10px 0; overflow:hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
    .progress-fill.done { background: var(--green); }
    h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 16px 0 8px; }
    .step { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); align-items:flex-start; }
    .step:last-child { border-bottom:none; }
    .step-icon { width:18px; text-align:center; flex-shrink:0; }
    .step-title { font-size: 0.9rem; }
    .step-meta { font-size: 0.75rem; color: var(--muted); }
    .step-failed .step-title { color: var(--red); }
    .step-in-progress .step-title { color: var(--yellow); }
    .step-completed .step-title { color: var(--green); }
    .desc { white-space:pre-wrap; font-size:0.9rem; color:var(--text); }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    button { padding:8px 14px; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--text); cursor:pointer; font-family:inherit; font-size:0.85rem; }
    button:hover { border-color:var(--accent); }
    button:disabled { opacity:0.5; cursor:default; }
    .btn-abandon { border-color:var(--red); color:var(--red); }
    .btn-abandon:hover { background:#3a1a1a; }
    .btn-complete { border-color:var(--green); color:var(--green); }
    .btn-complete:hover { background:#1a3a1a; }
    .btn-walk { border-color:var(--accent); color:var(--accent); font-weight:600; }
    .btn-walk:hover { background:#1a2a3a; }
    .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
    .checkin-box { background:#1a2a1a; border:1px solid var(--green); border-radius:8px; padding:12px; margin-bottom:12px; }
    .checkin-box a { color:var(--green); font-weight:500; }
    .live-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--green); margin-right:6px; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* ── Walkthrough overlay ── */
    .wt-overlay {
      position:fixed; inset:0; background:rgba(8,9,12,0.96); z-index:1000;
      display:none; flex-direction:column; padding:24px 16px;
    }
    .wt-overlay.active { display:flex; }
    .wt-wrap { max-width:680px; width:100%; margin:0 auto; flex:1; display:flex; flex-direction:column; }
    .wt-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .wt-counter { font-size:0.8rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
    .wt-close { background:none; border:none; color:var(--muted); font-size:1.4rem; cursor:pointer; padding:0 4px; }
    .wt-close:hover { color:var(--text); }
    .wt-context { font-size:0.85rem; color:var(--muted); margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
    .wt-context strong { color:var(--text); font-weight:600; }
    .wt-stage { flex:1; display:flex; flex-direction:column; justify-content:center; min-height:200px; }
    .wt-stepnum { font-size:0.75rem; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
    .wt-icon { font-size:2.4rem; margin-bottom:12px; }
    .wt-title { font-size:1.5rem; font-weight:600; margin-bottom:12px; line-height:1.3; }
    .wt-body { font-size:1rem; color:var(--text); white-space:pre-wrap; line-height:1.6; }
    .wt-status { display:inline-block; padding:3px 10px; border-radius:4px; font-size:0.75rem; font-weight:600; margin-bottom:16px; text-transform:uppercase; letter-spacing:1px; }
    .wt-progress { height:4px; background:var(--border); border-radius:2px; margin:24px 0; overflow:hidden; }
    .wt-progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.4s; }
    .wt-nav { display:flex; gap:12px; align-items:center; justify-content:space-between; padding-top:16px; border-top:1px solid var(--border); }
    .wt-nav-btns { display:flex; gap:8px; }
    .wt-hint { font-size:0.75rem; color:var(--muted); }
    .wt-hint kbd { background:var(--card); border:1px solid var(--border); border-radius:3px; padding:1px 5px; font-size:0.7rem; font-family:inherit; }
    .wt-summary { text-align:left; }
    .wt-summary .wt-title { margin-bottom:20px; }
    .wt-stat { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.95rem; }
    .wt-stat:last-child { border-bottom:none; }
    .wt-stat-label { color:var(--muted); }
    .wt-stat-val { font-weight:600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/add">+ Add Goal</a>
      <a href="/checkins">Check-ins</a>
      <a href="/goals" class="active">Goals</a>
    </div>
    <div id="content"><p class="empty">Loading goal...</p></div>
  </div>

  <!-- Walkthrough overlay -->
  <div class="wt-overlay" id="wt">
    <div class="wt-wrap">
      <div class="wt-top">
        <span class="wt-counter" id="wt-counter"></span>
        <button class="wt-close" onclick="exitWalkthrough()" title="Exit (Esc)">×</button>
      </div>
      <div class="wt-context" id="wt-context"></div>
      <div class="wt-progress"><div class="wt-progress-fill" id="wt-progress"></div></div>
      <div class="wt-stage" id="wt-stage"></div>
      <div class="wt-nav">
        <span class="wt-hint" id="wt-hint"></span>
        <div class="wt-nav-btns">
          <button id="wt-prev" onclick="walkPrev()">← Prev</button>
          <button id="wt-next" onclick="walkNext()">Next →</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/api/v1';
    const goalId = window.location.pathname.split('/').pop();
    let goal = null;
    let walkIndex = 0;       // 0 = intro, 1..N = steps, N+1 = summary
    let inWalkthrough = false;
    let refreshTimer = null;

    async function load() {
      try {
        const r = await fetch(`${API}/goals/${goalId}`);
        if (!r.ok) throw new Error(r.status);
        goal = await r.json();
        render(goal);
        if (inWalkthrough) renderWalkthrough();
      } catch(e) {
        document.getElementById('content').innerHTML = '<p class="empty" style="color:var(--red)">Goal not found.</p>';
      }
    }

    function render(g) {
      const pct = Math.round((g.progress || 0) * 100);
      document.title = `Job-Star: ${g.title}`;
      const domainBadge = `<span class="badge b-${g.domain}">${g.domain}</span>`;
      const urgencyBadge = `<span class="badge b-${g.urgency === 'idle-opportunistic' ? 'idle' : g.urgency}">${g.urgency}</span>`;
      const statusBadge = `<span class="badge b-${g.status}">${g.status}</span>`;
      const expert = g.expert ? ` · ${g.expert}` : '';
      const requested = g.requested_by ? ` · 👤 ${esc(g.requested_by)}` : '';
      const liveTag = g.status === 'active' ? '<span class="live-dot"></span>' : '';

      let html = `<h1>${esc(g.title)}</h1>`;
      html += `<div class="meta-row">${domainBadge} ${urgencyBadge} ${statusBadge}<span>${pct}%${expert}${requested}</span>${liveTag}</div>`;
      if (g.description) {
        html += `<div class="card"><div class="desc">${esc(g.description)}</div></div>`;
      }
      html += `<div class="progress-bar"><div class="progress-fill ${pct>=100?'done':''}" style="width:${pct}%"></div></div>`;

      // Pending check-in notice
      if (g.pending_checkin_id) {
        html += `<div class="checkin-box">✅ This goal has a check-in awaiting your review. <a href="/checkin/${g.pending_checkin_id}">Review it →</a></div>`;
      }

      // Steps
      if (g.steps && g.steps.length > 0) {
        html += `<h2>Steps (${g.steps.length})</h2><div class="card">`;
        g.steps.forEach((s, i) => {
          const icon = stepIcon(s.status);
          html += `<div class="step step-${s.status}"><div class="step-icon">${icon}</div><div><div class="step-title">${esc(s.title)}</div>${s.description?`<div class="step-meta">${esc(s.description)}</div>`:''}</div></div>`;
        });
        html += '</div>';
      } else {
        html += `<h2>Steps</h2><p class="empty">No steps yet. The system will plan this goal when a worker is available.</p>`;
      }

      // Actions
      html += `<div class="actions">`;
      if (g.steps && g.steps.length > 0) {
        html += `<button class="btn-walk" onclick="startWalkthrough()">▶ Walkthrough</button>`;
      }
      if (g.status === 'active') {
        if (pct >= 100) {
          html += `<button class="btn-complete" onclick="completeGoal()">✓ Mark Complete</button>`;
        }
        html += `<button class="btn-abandon" onclick="abandonGoal()">✗ Abandon Goal</button>`;
      }
      html += `</div>`;

      document.getElementById('content').innerHTML = html;
    }

    function stepIcon(status) {
      return status === 'completed' ? '✓' : (status === 'failed' ? '✗' : (status === 'in_progress' ? '●' : '○'));
    }

    function statusColor(status) {
      if (status === 'completed') return 'var(--green)';
      if (status === 'failed') return 'var(--red)';
      if (status === 'in_progress') return 'var(--yellow)';
      return 'var(--muted)';
    }

    // ── Walkthrough ──
    function startWalkthrough() {
      if (!goal || !goal.steps || !goal.steps.length) return;
      inWalkthrough = true;
      walkIndex = 0;
      document.getElementById('wt').classList.add('active');
      renderWalkthrough();
    }

    function exitWalkthrough() {
      inWalkthrough = false;
      document.getElementById('wt').classList.remove('active');
    }

    function walkTotal() {
      // intro + steps + summary
      return (goal.steps ? goal.steps.length : 0) + 2;
    }

    function renderWalkthrough() {
      if (!inWalkthrough || !goal) return;
      const steps = goal.steps || [];
      const total = walkTotal();
      const pct = Math.round((walkIndex / (total - 1)) * 100);

      document.getElementById('wt-counter').textContent = `${walkIndex + 1} / ${total}`;
      document.getElementById('wt-progress').style.width = pct + '%';

      // context line
      const goalPct = Math.round((goal.progress || 0) * 100);
      document.getElementById('wt-context').innerHTML =
        `<strong>${esc(goal.title)}</strong> — ${goal.status} · ${goalPct}% complete`;

      const stage = document.getElementById('wt-stage');
      const prevBtn = document.getElementById('wt-prev');
      const nextBtn = document.getElementById('wt-next');
      const hint = document.getElementById('wt-hint');

      prevBtn.disabled = walkIndex === 0;

      if (walkIndex === 0) {
        // Intro
        stage.innerHTML = `
          <div class="wt-stepnum">Overview</div>
          <div class="wt-icon">🎯</div>
          <div class="wt-title">${esc(goal.title)}</div>
          <div class="wt-body">${goal.description ? esc(goal.description) : '<span style="color:var(--muted)">No description provided.</span>'}</div>`;
        nextBtn.textContent = steps.length ? 'Start Steps →' : 'Summary →';
        hint.innerHTML = steps.length ? `<kbd>→</kbd> begin ${steps.length} step${steps.length>1?'s':''}` : '<kbd>→</kbd> summary';
      } else if (walkIndex <= steps.length) {
        // Step walkIndex (1-indexed)
        const s = steps[walkIndex - 1];
        const color = statusColor(s.status);
        stage.innerHTML = `
          <div class="wt-stepnum">Step ${walkIndex} of ${steps.length}</div>
          <div class="wt-icon" style="color:${color}">${stepIcon(s.status)}</div>
          <div class="wt-status" style="background:${color}22;color:${color}">${esc(s.status)}</div>
          <div class="wt-title">${esc(s.title)}</div>
          <div class="wt-body">${s.description ? esc(s.description) : '<span style="color:var(--muted)">No detail for this step.</span>'}</div>`;
        nextBtn.textContent = walkIndex === steps.length ? 'Summary →' : 'Next →';
        hint.innerHTML = `<kbd>←</kbd> back &nbsp; <kbd>→</kbd> next`;
      } else {
        // Summary
        const completed = steps.filter(s => s.status === 'completed').length;
        const failed = steps.filter(s => s.status === 'failed').length;
        const inProg = steps.filter(s => s.status === 'in_progress').length;
        const pending = steps.filter(s => s.status === 'pending').length;
        const allDone = completed === steps.length;
        stage.innerHTML = `
          <div class="wt-summary">
            <div class="wt-stepnum">Summary</div>
            <div class="wt-icon" style="color:${allDone?'var(--green)':'var(--accent)'}">${allDone?'✅':'📋'}</div>
            <div class="wt-title">${allDone ? 'All steps complete' : 'Walkthrough finished'}</div>
            <div class="card" style="background:var(--card);border:1px solid var(--border);padding:14px;border-radius:8px">
              <div class="wt-stat"><span class="wt-stat-label">Total steps</span><span class="wt-stat-val">${steps.length}</span></div>
              <div class="wt-stat"><span class="wt-stat-label" style="color:var(--green)">Completed</span><span class="wt-stat-val" style="color:var(--green)">${completed}</span></div>
              <div class="wt-stat"><span class="wt-stat-label" style="color:var(--yellow)">In progress</span><span class="wt-stat-val" style="color:var(--yellow)">${inProg}</span></div>
              <div class="wt-stat"><span class="wt-stat-label">Pending</span><span class="wt-stat-val">${pending}</span></div>
              <div class="wt-stat"><span class="wt-stat-label" style="color:var(--red)">Failed</span><span class="wt-stat-val" style="color:var(--red)">${failed}</span></div>
              <div class="wt-stat"><span class="wt-stat-label">Overall progress</span><span class="wt-stat-val">${goalPct}%</span></div>
            </div>
            ${goal.pending_checkin_id ? `<div class="checkin-box" style="margin-top:12px">✅ Check-in awaiting review. <a href="/checkin/${goal.pending_checkin_id}">Review it →</a></div>` : ''}
          </div>`;
        nextBtn.textContent = 'Restart ↻';
        hint.innerHTML = `<kbd>←</kbd> back &nbsp; <kbd>Esc</kbd> exit`;
      }
    }

    function walkNext() {
      const total = walkTotal();
      if (walkIndex < total - 1) {
        walkIndex++;
      } else {
        walkIndex = 0;  // restart
      }
      renderWalkthrough();
    }

    function walkPrev() {
      if (walkIndex > 0) walkIndex--;
      renderWalkthrough();
    }

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (!inWalkthrough) return;
      if (e.key === 'ArrowRight') { e.preventDefault(); walkNext(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); walkPrev(); }
      else if (e.key === 'Escape') { e.preventDefault(); exitWalkthrough(); }
    });

    async function completeGoal() {
      if (!confirm('Mark this goal as complete?')) return;
      try {
        await fetch(`${API}/goals/${goalId}/complete`, {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
        load();
      } catch(e) { alert('Failed to complete goal.'); }
    }

    async function abandonGoal() {
      if (!confirm('Abandon this goal? It will be cancelled and stop appearing in the active list.')) return;
      try {
        await fetch(`${API}/goals/${goalId}/abandon`, {method:'POST'});
        load();
      } catch(e) { alert('Failed to abandon goal.'); }
    }

    function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    // Initial load + live auto-refresh (5s) so step statuses update as workers progress
    load();
    refreshTimer = setInterval(load, 5000);
  </script>
</body>
</html>
